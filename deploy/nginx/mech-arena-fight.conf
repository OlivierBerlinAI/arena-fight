# Host nginx site for mech-arena-fight.olivier.berlin.
#
# Setup:
#   1. Point a DNS A (and AAAA) record for mech-arena-fight.olivier.berlin at
#      this VPS first — Let's Encrypt validates over the public domain.
#   2. Copy this file to /etc/nginx/sites-available/mech-arena-fight.conf and
#      symlink it into sites-enabled/  (or drop it straight into conf.d/).
#   3. sudo nginx -t && sudo systemctl reload nginx
#   4. Obtain + auto-renew the certificate (the nginx plugin rewrites this file
#      to add the TLS server block and an HTTP->HTTPS redirect for you):
#         sudo certbot --nginx -d mech-arena-fight.olivier.berlin
#
# Until certbot runs, this serves plain HTTP — which is exactly what the
# Let's Encrypt HTTP-01 challenge needs. Afterwards everything is HTTPS/WSS.
#
# The ports below must match SERVER_PORT / CLIENT_PORT from your .env.

upstream arena_server   { server 127.0.0.1:8090; }   # game server container
upstream arena_frontend { server 127.0.0.1:8091; }   # static client container

server {
    listen 80;
    listen [::]:80;
    server_name mech-arena-fight.olivier.berlin;

    # Cap request bodies — this app only ever sends tiny JSON frames.
    client_max_body_size 64k;

    # WebSocket game traffic -> server container.
    location /ws {
        proxy_pass http://arena_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # game sockets are long-lived
        proxy_send_timeout 3600s;
    }

    # Everything else -> static frontend container.
    location / {
        proxy_pass http://arena_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
