# Dedicated host-nginx site for mech-arena-fight.olivier.berlin.
#
# This is a self-contained HTTP->HTTPS + reverse-proxy vhost. Obtain the TLS
# cert WITHOUT letting certbot rewrite your nginx config — that avoids the
# duplicate-server_name / redirect-loop trap (see DEPLOY.md "Troubleshooting"):
#
#     sudo certbot certonly --nginx -d mech-arena-fight.olivier.berlin
#
# Then enable THIS file (and make sure no other vhost also claims the domain)
# and reload nginx. The ports below must match SERVER_PORT / CLIENT_PORT from
# your .env.

upstream arena_server   { server 127.0.0.1:8090; }   # game server container
upstream arena_frontend { server 127.0.0.1:8091; }   # static client container

# HTTP -> HTTPS. The redirect lives ONLY on port 80, so HTTPS can never loop.
server {
    listen 80;
    listen [::]:80;
    server_name mech-arena-fight.olivier.berlin;
    return 301 https://$host$request_uri;
}

# HTTPS: terminate TLS and reverse-proxy. This block does NOT redirect.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name mech-arena-fight.olivier.berlin;

    ssl_certificate     /etc/letsencrypt/live/mech-arena-fight.olivier.berlin/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mech-arena-fight.olivier.berlin/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # This app only ever sends tiny JSON frames.
    client_max_body_size 64k;

    # WebSocket game traffic -> server container.
    location /ws {
        proxy_pass http://arena_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # game sockets are long-lived
        proxy_send_timeout 3600s;
    }

    # Everything else -> static frontend container.
    location / {
        proxy_pass http://arena_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
