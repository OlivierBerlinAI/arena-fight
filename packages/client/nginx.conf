# In-container nginx that serves the built client. It listens on an
# unprivileged port (8080) and only serves static files — TLS and routing are
# handled by the host nginx in front of it.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache the content-hashed Vite assets, never the HTML shell.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Single-page app: unknown paths fall back to the shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Container healthcheck target.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
